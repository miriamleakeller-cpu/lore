<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lore</title>
<meta name="theme-color" content="#16141A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lore">
<script src="js/jszip.min.js"></script>
<script src="js/epub.min.js"></script>
<style>
/* ============ Local fonts (offline-first) ============ */
@font-face{font-family:'Fraunces';src:url('fonts/Fraunces.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Fraunces';src:url('fonts/Fraunces-Italic.ttf') format('truetype');font-weight:100 900;font-style:italic;font-display:swap}
@font-face{font-family:'Space Grotesk';src:url('fonts/SpaceGrotesk.ttf') format('truetype');font-weight:300 700;font-display:swap}
@font-face{font-family:'Literata';src:url('fonts/Literata.ttf') format('truetype');font-weight:100 900;font-display:swap}
@font-face{font-family:'OpenDyslexic';src:url('fonts/OpenDyslexic-Regular.woff') format('woff');font-weight:400;font-display:swap}
@font-face{font-family:'OpenDyslexic';src:url('fonts/OpenDyslexic-Bold.woff') format('woff');font-weight:700;font-display:swap}

/* ============ Tokens ============ */
:root{
  --bg:#16141A;
  --panel:rgba(255,255,255,.055);
  --solid:#221F29;
  --glass:rgba(30,27,36,.72);
  --line:rgba(247,237,216,.14);
  --ink:#F3ECDD;
  --ink-dim:rgba(243,236,221,.55);
  --ink-faint:rgba(243,236,221,.32);
  --accent:#B9A7E6;
  --accent-ink:#2A2040;
  --gold:#F0B429;
  --red:#D93A4A;
  --shelf:rgba(247,237,216,.16);
  --disp:"Fraunces",serif;
  --sans:"Space Grotesk",system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --cover-row:292px;
  --spine-row:248px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font-family:inherit}
[hidden]{display:none!important}
svg.i{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ============ Header ============ */
header{
  position:fixed;top:0;left:0;right:0;z-index:30;
  padding:calc(var(--safe-top) + 14px) 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,var(--bg) 55%,transparent);
  pointer-events:none;
}
header>*{pointer-events:auto}
.brand{font-family:var(--disp);font-style:italic;font-weight:800;font-size:22px;font-variation-settings:"opsz" 80}
.brand i{font-style:italic;color:var(--accent)}
.shelf-title{text-align:center;flex:1}
.shelf-title h1{font-family:var(--disp);font-weight:600;font-style:italic;font-size:17px;letter-spacing:.01em}
.dots{display:flex;gap:6px;justify-content:center;margin-top:7px}
.dots i{width:5px;height:5px;border-radius:99px;background:var(--ink-faint);transition:all .25s}
.dots i.on{background:var(--accent);width:16px}
.plain-btn{width:40px;height:40px;display:grid;place-items:center}

/* App menu (simple, solid) */
#appmenu{
  position:fixed;top:calc(var(--safe-top) + 60px);right:16px;z-index:45;min-width:196px;
  background:var(--solid);border:1px solid var(--line);border-radius:16px;padding:6px;
  box-shadow:0 18px 36px -14px rgba(0,0,0,.7);
}
#appmenu button{display:block;width:100%;text-align:left;padding:12px 16px;font-size:14.5px;border-radius:11px}
#appmenu button:active{background:var(--panel)}

/* ============ Pager / Shelves ============ */
#pager{
  display:flex;height:100dvh;
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
}
#pager::-webkit-scrollbar{display:none}
.shelf{
  min-width:100vw;max-width:100vw;height:100%;
  scroll-snap-align:start;scroll-snap-stop:always;
  overflow-y:auto;overflow-x:hidden;
  padding:calc(var(--safe-top) + 92px) 20px calc(var(--safe-bot) + 110px);
}
.shelf::-webkit-scrollbar{display:none}
.empty{
  margin-top:16vh;text-align:center;color:var(--ink-dim);
  font-size:14.5px;line-height:1.7;padding:0 24px;
}
.empty b{display:block;font-family:var(--disp);font-style:italic;font-weight:600;font-size:20px;color:var(--ink);margin-bottom:10px}

/* Current Reads: two front covers per shelf level, bottoms flush with the shelf */
.cover-rows{display:flex;flex-wrap:wrap;justify-content:center;
  background:repeating-linear-gradient(to bottom,
    transparent 0, transparent calc(var(--cover-row) - 6px),
    var(--shelf) calc(var(--cover-row) - 6px), var(--shelf) calc(var(--cover-row) - 3px),
    transparent calc(var(--cover-row) - 3px), transparent var(--cover-row));
}
.cover-slot{
  width:50%;height:var(--cover-row);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:6px;
}
.cover{
  position:relative;border-radius:6px;overflow:hidden;
  box-shadow:0 18px 30px -14px rgba(0,0,0,.75),0 2px 0 rgba(255,255,255,.05) inset;
  transition:transform .18s ease;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.cover:active{transform:scale(.97)}
.cover svg{display:block}
.cover.dragging{opacity:.25}

/* Spines (Shelf + TBR), bottoms flush with the shelf line */
.spine-rows{display:flex;flex-wrap:wrap;align-content:flex-start;justify-content:center;column-gap:5px;
  background:repeating-linear-gradient(to bottom,
    transparent 0, transparent calc(var(--spine-row) - 6px),
    var(--shelf) calc(var(--spine-row) - 6px), var(--shelf) calc(var(--spine-row) - 3px),
    transparent calc(var(--spine-row) - 3px), transparent var(--spine-row));
  min-height:var(--spine-row);
}
.spine-slot{height:var(--spine-row);display:flex;align-items:flex-end;padding-bottom:6px}
.spine{
  border-radius:3px 3px 2px 2px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 10px 18px -10px rgba(0,0,0,.7);
  transition:transform .15s ease;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.spine:active{transform:translateY(-4px)}
.spine .deco{width:100%;flex:0 0 auto}
.spine .txt{
  flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  writing-mode:vertical-rl;padding:12px 0 10px;overflow:hidden;
}
.spine .t{letter-spacing:.04em;line-height:1;white-space:nowrap;max-height:100%;overflow:hidden;text-overflow:ellipsis}
.spine .a{opacity:.72;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.06em}
.spine .stars{
  flex:0 0 auto;display:flex;flex-direction:column;gap:1px;padding:3px 0 8px;
  font-size:7.5px;line-height:1;color:var(--gold);
  text-shadow:0 0 1.5px rgba(20,12,4,.65),0 1px 1px rgba(20,12,4,.35);
}
.spine.dragging{opacity:.25}
.drag-ghost{
  position:fixed;z-index:90;pointer-events:none;transform:rotate(3deg) scale(1.05);
  box-shadow:0 24px 40px -12px rgba(0,0,0,.85);border-radius:4px;overflow:hidden;
}
.cover-rows,.spine-rows{position:relative}
.drop-ind{
  position:absolute;width:4px;border-radius:99px;background:var(--accent);
  display:none;pointer-events:none;z-index:5;
}

/* ============ FAB ============ */
#fab{
  position:fixed;right:22px;bottom:calc(var(--safe-bot) + 12px);z-index:30;
  width:56px;height:56px;border-radius:19px;
  background:var(--accent);color:var(--accent-ink);
  font-size:28px;font-weight:500;line-height:1;
  box-shadow:0 10px 20px -10px rgba(0,0,0,.6);
  display:grid;place-items:center;transition:transform .15s;
}
#fab:active{transform:scale(.92)}

/* ============ Sheets & Modals ============ */
#scrim{
  position:fixed;inset:0;z-index:40;background:rgba(10,9,12,.55);
  opacity:0;transition:opacity .25s;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
}
#scrim.on{opacity:1}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);
  border:1px solid var(--line);border-bottom:none;
  border-radius:26px 26px 0 0;
  padding:14px 24px calc(var(--safe-bot) + 26px);
  max-height:86dvh;overflow-y:auto;
  transform:translateY(105%);transition:transform .32s cubic-bezier(.32,.9,.35,1);
}
.sheet.on{transform:translateY(0)}
.grip-zone{margin:-14px -24px 4px;padding:14px 24px 10px;touch-action:none;cursor:grab}
.grip{width:38px;height:4px;border-radius:99px;background:var(--ink-faint);margin:0 auto}
.sheet h2{font-family:var(--sans);font-weight:600;font-size:20px;letter-spacing:.01em}
.sheet h2.booktitle{font-family:var(--disp);font-style:italic;font-weight:700;font-size:24px;line-height:1.15;font-variation-settings:"opsz" 40}
.sheet .by{color:var(--ink-dim);font-size:13.5px;margin-top:5px;letter-spacing:.03em}
.sheet section{margin-top:22px}
.sheet .label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px}
.quote{
  border-left:2px solid var(--accent);padding:2px 0 2px 14px;margin-bottom:14px;
  font-family:var(--disp);font-style:italic;font-size:15.5px;line-height:1.55;
}
.review-txt{font-size:14.5px;line-height:1.65;color:var(--ink-dim);white-space:pre-wrap}
.btn{
  display:block;width:100%;padding:15px;border-radius:15px;margin-top:11px;
  background:var(--panel);border:1px solid var(--line);
  font-size:15px;font-weight:500;text-align:center;transition:transform .12s;
}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--accent);border-color:transparent;color:var(--accent-ink);font-weight:600}
.btn.danger{color:var(--red);border-color:rgba(217,58,74,.3);margin-top:24px}
.field{margin-top:14px}
.field label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px}
.field input[type=text],.field textarea{
  width:100%;background:var(--panel);border:1px solid var(--line);border-radius:13px;
  padding:13px 14px;color:var(--ink);font-size:16px;outline:none;
}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:88px;resize:vertical;line-height:1.5}
.filebtn{
  display:block;width:100%;text-align:left;
  background:var(--panel);border:1px dashed var(--line);border-radius:13px;
  padding:13px 14px;font-size:14px;color:var(--ink-dim);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.filebtn.has{color:var(--accent);border-style:solid;border-color:var(--accent)}
.stars-input{display:flex;gap:10px;justify-content:center;padding:6px 0}
.stars-input button{font-size:40px;line-height:1;color:var(--ink-faint);transition:transform .1s}
.stars-input button.on{color:var(--gold)}
.stars-input button:active{transform:scale(1.15)}
.stars-line{color:var(--gold);letter-spacing:2px;font-size:15px;margin-top:8px}
.qrow{display:flex;gap:8px;align-items:flex-start;margin-top:10px}
.qrow textarea{flex:1;min-height:64px}
.qrow .qdel{
  width:38px;height:38px;flex:0 0 auto;border-radius:12px;margin-top:2px;
  background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);font-size:17px;
}
/* Quote archive cards */
.qcard{
  border-radius:16px;padding:16px 18px;margin-top:12px;
  font-family:var(--disp);font-style:italic;font-size:15.5px;line-height:1.55;
}
.qcard .qsrc{
  font-family:var(--sans);font-style:normal;font-size:10.5px;
  letter-spacing:.1em;text-transform:uppercase;opacity:.78;margin-top:10px;
}

.modal{
  position:fixed;z-index:55;left:50%;top:50%;transform:translate(-50%,-50%) scale(.92);
  width:min(88vw,360px);opacity:0;pointer-events:none;
  background:var(--glass);backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);
  border:1px solid var(--line);border-radius:26px;padding:28px 24px;
  transition:all .28s cubic-bezier(.32,.9,.35,1);text-align:center;
}
.modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.modal h2{font-family:var(--sans);font-weight:600;font-size:19px;letter-spacing:.01em}
.modal .fin{font-family:var(--disp);font-style:italic;color:var(--ink-dim);font-size:15px;margin-top:6px}

/* ============ Reading stats ============ */
.streak{text-align:center;margin-top:26px}
.streak .n{font-family:var(--sans);font-weight:700;font-size:52px;line-height:1;display:block}
.streak .l{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-top:8px;display:block}
.hm-head{display:flex;align-items:center;justify-content:space-between;max-width:224px;margin:30px auto 14px}
.hm-head b{font-family:var(--sans);font-weight:500;font-size:14.5px;letter-spacing:.02em}
.hm-head button{width:32px;height:32px;border-radius:10px;background:var(--panel);border:1px solid var(--line);font-size:15px;color:var(--ink-dim)}
.heat{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:224px;margin:0 auto}
.heat .d{aspect-ratio:1;border-radius:4px;background:var(--panel)}
.heat .d.l1{background:rgba(185,167,230,.22)}
.heat .d.l2{background:rgba(185,167,230,.45)}
.heat .d.l3{background:rgba(185,167,230,.7)}
.heat .d.l4{background:var(--accent)}

/* ============ Reader ============ */
#reader{
  position:fixed;inset:0;z-index:60;background:#16141A;color:#E9E2D4;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#reader.on{opacity:1;pointer-events:auto}
#reader.light{background:#F5EFE0;color:#2A2430}
#rtop{
  position:absolute;top:0;left:0;right:0;z-index:4;
  display:flex;align-items:center;gap:4px;
  padding:calc(var(--safe-top) + 10px) 12px 10px;
  background:linear-gradient(to bottom,#16141A 55%,transparent);
}
#reader.light #rtop{background:linear-gradient(to bottom,#F5EFE0 55%,transparent)}
#r-back,#r-set,#r-quote{width:38px;height:38px;display:grid;place-items:center;flex:0 0 auto}
#r-quote.on{color:var(--accent)}
#reader.quoting .tapzone{pointer-events:none}
#r-title{
  flex:1;font-family:var(--disp);font-style:italic;font-weight:600;font-size:15px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
#reader-view{position:absolute;left:8px;right:8px;top:calc(var(--safe-top) + 58px);bottom:calc(var(--safe-bot) + 26px)}
.tapzone{position:absolute;top:calc(var(--safe-top) + 58px);bottom:60px;width:27%;z-index:2}
.tapzone.left{left:0}
.tapzone.right{right:0}
#rbar{
  position:absolute;left:0;right:0;bottom:0;height:calc(var(--safe-bot) + 16px);
  padding-bottom:var(--safe-bot);z-index:2;display:flex;align-items:center;
}
#rbar .track{flex:1;height:2.5px;margin:0 20px;background:rgba(128,128,128,.22);border-radius:99px;overflow:hidden}
#rbar .track i{display:block;height:100%;width:0%;background:var(--accent);transition:width .3s}

/* Reader settings panel (simple, solid) */
#rset-scrim{position:absolute;inset:0;z-index:5;background:transparent}
#rset{
  position:absolute;right:12px;top:calc(var(--safe-top) + 56px);z-index:6;width:256px;
  background:var(--solid);border:1px solid var(--line);border-radius:18px;padding:14px;
  transform:translateY(-8px);opacity:0;pointer-events:none;transition:all .22s;
  color:var(--ink);box-shadow:0 18px 36px -14px rgba(0,0,0,.6);
}
#rset.on{transform:none;opacity:1;pointer-events:auto}
#rset .rrow{display:flex;gap:8px;margin-top:10px}
#rset .rrow:first-child{margin-top:0}
.rbtn{flex:1;height:44px;border-radius:13px;background:rgba(255,255,255,.07);border:1px solid var(--line);font-size:16px;font-weight:600;color:inherit}
.rbtn:active,.rbtn.flash{background:var(--accent);color:var(--accent-ink);border-color:transparent}
.theme-pill{flex:1;display:flex;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:13px;overflow:hidden}
.theme-pill button{flex:1;height:42px;display:grid;place-items:center;color:inherit;opacity:.6;transition:all .2s}
.theme-pill button.on{background:var(--accent);color:var(--accent-ink);opacity:1}
#r-font button{flex:1;height:44px;border-radius:13px;background:rgba(255,255,255,.07);border:1px solid var(--line);font-size:13px;color:inherit}
#r-font button[data-f=serif]{font-family:'Literata',serif}
#r-font button[data-f=sans]{font-family:var(--sans)}
#r-font button[data-f=dyslexic]{font-family:'OpenDyslexic',sans-serif;font-size:11.5px}
#r-font button.on{background:var(--accent);color:var(--accent-ink);border-color:transparent}
#reader.light #rset{background:#FFFDF8;border-color:rgba(42,36,48,.14);color:#2A2430;box-shadow:0 18px 36px -14px rgba(0,0,0,.25)}
#reader.light #rset .rbtn,
#reader.light #rset .theme-pill,
#reader.light #rset #r-font button{background:rgba(42,36,48,.06);border-color:rgba(42,36,48,.14)}
#reader.light #rset .theme-pill button.on,
#reader.light #rset #r-font button.on{background:var(--accent);color:var(--accent-ink)}

#r-finish{
  position:absolute;left:50%;transform:translateX(-50%);bottom:calc(var(--safe-bot) + 34px);z-index:5;
  background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:13.5px;
  border-radius:99px;padding:11px 20px;box-shadow:0 10px 22px -10px rgba(0,0,0,.55);
}
#qpop{
  position:absolute;left:50%;transform:translateX(-50%);bottom:calc(var(--safe-bot) + 70px);z-index:6;
  background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:14px;
  border-radius:99px;padding:12px 20px;box-shadow:0 12px 24px -8px rgba(0,0,0,.5);
}

/* ============ Toast ============ */
#toast{
  position:fixed;left:50%;bottom:calc(var(--safe-bot) + 96px);transform:translateX(-50%) translateY(12px);
  z-index:80;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--line);border-radius:99px;padding:11px 22px;
  font-size:13.5px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%)}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="brand">L<i>o</i>re</div>
  <div class="shelf-title">
    <h1 id="shelf-name">Current Reads</h1>
    <div class="dots"><i></i><i class="on"></i><i></i></div>
  </div>
  <button class="plain-btn" id="btn-menu" aria-label="Menu">
    <svg class="i" viewBox="0 0 24 24" style="width:21px;height:21px"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>
</header>

<div id="appmenu" hidden>
  <button data-m="stats">Reading stats</button>
  <button data-m="quotes">Quote archive</button>
  <button data-m="data">Import / Export</button>
</div>

<main id="pager">
  <section class="shelf" id="shelf-done"></section>
  <section class="shelf" id="shelf-now"></section>
  <section class="shelf" id="shelf-tbr"></section>
</main>

<button id="fab" aria-label="Add a book">+</button>

<div id="scrim" hidden></div>
<div class="sheet" id="sheet"></div>
<div class="modal" id="finish-modal"></div>
<div id="reader">
  <div id="rtop">
    <button id="r-back" aria-label="Back">
      <svg class="i" viewBox="0 0 24 24" style="width:22px;height:22px"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <span id="r-title"></span>
    <button id="r-quote" aria-label="Mark a quote">
      <svg class="i" viewBox="0 0 24 24" style="width:20px;height:20px">
        <path d="M10 7a3 3 0 1 1-6 0 3 3 0 0 1 6 0c0 3.6-1.4 6-4 7.4"/>
        <path d="M20 7a3 3 0 1 1-6 0 3 3 0 0 1 6 0c0 3.6-1.4 6-4 7.4"/>
      </svg>
    </button>
    <button id="r-set" aria-label="Reading settings">

        <path d="M4 9h3.6M12.4 9H20M4 15h9.6M18.4 15H20"/>
        <circle cx="10" cy="9" r="2.4"/><circle cx="16" cy="15" r="2.4"/>

          <svg class="i" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button data-t="dark" aria-label="Dark mode">

  <button id="qpop" hidden>Save quote</button>
</div>
<div id="toast"></div>

<script>
/* ================================================================
   Lore – a personal library
   ================================================================ */
'use strict';

/* ---------- IndexedDB ---------- */
const DB = {
  _db:null,
  open(){return new Promise((res,rej)=>{
    const r=indexedDB.open('lore-db',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      d.createObjectStore('books',{keyPath:'id'});
      d.createObjectStore('files');
      d.createObjectStore('days',{keyPath:'date'});
    };
    r.onsuccess=()=>{DB._db=r.result;res();};
    r.onerror=()=>rej(r.error);
  });},
  _st(s,m){return DB._db.transaction(s,m).objectStore(s);},
  put(s,v,k){return new Promise((res,rej)=>{const q=DB._st(s,'readwrite').put(v,k);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});},
  get(s,k){return new Promise((res,rej)=>{const q=DB._st(s,'readonly').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});},
  del(s,k){return new Promise((res,rej)=>{const q=DB._st(s,'readwrite').delete(k);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});},
  all(s){return new Promise((res,rej)=>{const q=DB._st(s,'readonly').getAll();q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}
};

/* ---------- State & helpers ---------- */
let books=[];
let currentShelf=1; // 0 shelf, 1 current reads, 2 tbr
const SHELF_NAMES=['Shelf','Current Reads','TBR'];
const $=s=>document.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayKey=(d=new Date())=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg){
  const t=$('#toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200);
}
function downloadBlob(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},4000);
}

/* ---------- Deterministic, balanced art ---------- */
function hashSeed(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function rng(seed){let s=seed||1;return()=>{s^=s<<13;s^=s>>>17;s^=s<<5;s>>>=0;return s/4294967296;};}
function shuffled(arr,R){return arr.map(x=>[R(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);}
/* Pick the least-used candidate, respecting the book's own seeded preference
   order and skipping banned ones. Guarantees all colours/patterns appear early
   and spread evenly across the shelf. */
function pickBalanced(order,usage,isBanned){
  let best=null,bestN=Infinity;
  for(const c of order){
    if(isBanned&&isBanned(c))continue;
    const n=usage.get(c)||0;
    if(n<bestN){bestN=n;best=c;}
  }
  if(best==null)best=order[0];
  usage.set(best,(usage.get(best)||0)+1);
  return best;
}

/* Palette trios: [background, card, text-on-card] – no white/cream backgrounds */
const TRIOS=[
  ['#F0B429','#F7EDD8','#B5432A'],
  ['#E8552F','#F7EDD8','#0C4A38'],
  ['#0C4A38','#DCEFC8','#B5432A'],
  ['#7C1F3E','#EFA6C6','#7C1F3E'],
  ['#3D74D8','#CFE3FF','#1D3E8C'],
  ['#B9A7E6','#3A2560','#EFDFC8'],
  ['#157A5B','#EFA6C6','#0C4A38'],
  ['#9FD3E4','#0C3B5E','#9FD3E4'],
  ['#EFA6C6','#7C1F3E','#EFA6C6'],
  ['#3A2560','#B9A7E6','#3A2560'],
];
const SPINE_COLORS=['#F0B429','#E8552F','#0C4A38','#7C1F3E','#3D74D8','#B9A7E6','#157A5B','#9FD3E4','#EFA6C6','#D93A4A','#3A2560'];
const FONTS=[
  {f:'Fraunces',w:800,it:false,up:false},
  {f:'Fraunces',w:600,it:true, up:false},
  {f:'Space Grotesk',w:700,it:false,up:true},
  {f:'Fraunces',w:900,it:false,up:true},
  {f:'Space Grotesk',w:500,it:false,up:false},
];
const VARIANTS=[0,1,2,3,4,5,6,7];
const DECOS=[0,1,2,3,4,5,6];
/* Text region per cover variant: keeps titles inside frames & away from edges */
const REGIONS={
  0:{maxW:176,yTop:78, yBot:316},
  1:{maxW:164,yTop:76, yBot:376},
  2:{maxW:176,yTop:188,yBot:392},
  3:{maxW:232,yTop:252,yBot:402},
  4:{maxW:232,yTop:64, yBot:312},
  5:{maxW:168,yTop:76, yBot:376},
  6:{maxW:218,yTop:248,yBot:402},
  7:{maxW:150,yTop:112,yBot:308},
};

function luminance(hex){
  const n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255;
  return (0.299*r+0.587*g+0.114*b)/255;
}
function inkFor(bg){return luminance(bg)>0.55?'#221B2A':'#F7EDD8';}

function wrapText(str,max,maxLines){
  const words=String(str).split(/\s+/),lines=[];let cur='';let cut=false;
  for(const w of words){
    if((cur+' '+w).trim().length<=max)cur=(cur+' '+w).trim();
    else{
      if(cur)lines.push(cur);
      cur=w.length>max?w.slice(0,max-1)+'…':w;
      if(lines.length>=maxLines){cut=true;break;}
    }
  }
  if(cur&&lines.length<maxLines)lines.push(cur);
  else if(cur)cut=true;
  if(cut){
    let last=lines[lines.length-1];
    if(!last.endsWith('…'))lines[lines.length-1]=(last.length>=max?last.slice(0,max-1):last)+'…';
  }
  return lines;
}

/* Pick a cover style: balanced usage + no repeats next to each other */
function coverStyle(book,ctx){
  const seed=hashSeed(book.title+'|'+(book.author||''));
  const R=rng(seed);
  const trioOrder=shuffled(TRIOS.map((_,i)=>i),R);
  const variantOrder=shuffled(VARIANTS,R);
  const fontOrder=shuffled(FONTS.map((_,i)=>i),R);
  const widthJitter=R();
  const trioIdx=pickBalanced(trioOrder,ctx.trioUsage,i=>ctx.bannedBgs.has(TRIOS[i][0]));
  const variant=pickBalanced(variantOrder,ctx.varUsage,v=>ctx.bannedVars.has(v));
  const fontIdx=pickBalanced(fontOrder,ctx.fontUsage,i=>i===ctx.bannedFont);
  return {trio:TRIOS[trioIdx],variant,font:FONTS[fontIdx],fontIdx,widthJitter};
}

/* Front cover as SVG (300×450 viewBox) */
function coverSVG(book,w,st){
  const [bg,card,inkRaw]=st.trio;
  const font=st.font,variant=st.variant;
  const reg=REGIONS[variant];
  const title=font.up?String(book.title).toUpperCase():book.title;
  const maxChars=font.up?11:13;
  const lines=wrapText(title,maxChars,5);
  const longest=Math.max(...lines.map(l=>l.length),1);
  const cf=font.up?0.66:0.56;
  let fs=Math.min(36,reg.maxW/(longest*cf));
  const regionH=reg.yBot-reg.yTop;
  if(lines.length*fs*1.18>regionH)fs=regionH/(lines.length*1.18);
  fs=Math.max(fs,11);
  const lh=fs*1.18;
  let shape='';
  if(variant===0){ /* bookmark banner */
    shape=`<path d="M42 40 H258 V386 L150 340 L42 386 Z" fill="${card}"/>`;
  }else if(variant===1){ /* ticket frame */
    shape=`<rect x="34" y="42" width="232" height="366" rx="20" fill="${card}"/>
           <rect x="48" y="56" width="204" height="338" rx="12" fill="none" stroke="${inkRaw}" stroke-width="2.5" stroke-dasharray="1 7" stroke-linecap="round"/>`;
  }else if(variant===2){ /* arch */
    shape=`<path d="M42 168 A108 108 0 0 1 258 168 V408 H42 Z" fill="${card}"/>`;
  }else if(variant===3){ /* squiggle */
    shape=`<path d="M60 96 C 140 40, 170 160, 245 100 S 210 210, 130 170 S 60 240, 95 160" fill="none" stroke="${card}" stroke-width="17" stroke-linecap="round"/>`;
  }else if(variant===4){ /* stripes */
    shape=[0,1,2,3].map(i=>`<rect x="42" y="${330+i*18}" width="216" height="9" rx="4.5" fill="${card}" opacity="${1-i*0.18}"/>`).join('');
  }else if(variant===5){ /* wave card */
    shape=`<rect x="38" y="46" width="224" height="358" rx="42" fill="${card}"/>
           <path d="M76 356 q 12 -11 24 0 t 24 0 t 24 0 t 24 0 t 24 0 t 24 0" fill="none" stroke="${inkRaw}" stroke-width="3" stroke-linecap="round" opacity=".75"/>`;
  }else if(variant===6){ /* sunburst */
    shape=[-66,-44,-22,0,22,44,66].map(a=>
      `<g transform="rotate(${a} 150 204)"><rect x="143" y="86" width="14" height="102" rx="7" fill="${card}"/></g>`).join('')+
      `<rect x="70" y="198" width="160" height="13" rx="6.5" fill="${card}"/>`;
  }else{ /* oval */
    shape=`<ellipse cx="150" cy="210" rx="115" ry="152" fill="${card}"/>`;
  }
  const inCard=[0,1,2,5,7].includes(variant);
  const tInk=inCard?inkRaw:inkFor(bg);
  const yc=(reg.yTop+reg.yBot)/2;
  const yStart=yc-((lines.length-1)*lh)/2;
  const textEls=lines.map((l,i)=>
    `<text x="150" y="${yStart+i*lh}" text-anchor="middle" fill="${tInk}"
      font-family="${font.f}" font-weight="${font.w}" font-size="${fs.toFixed(1)}"
      ${font.it?'font-style="italic"':''} ${font.up?'letter-spacing="1.5"':''}>${esc(l)}</text>`).join('');
  let author='';
  if(book.author){
    let a=String(book.author).trim();
    if(a.length>40){
      const parts=a.split(/\s+/);
      a=parts[parts.length-1];
    }
    a=a.toUpperCase();
    let afs=Math.min(13,260/(Math.max(a.length,1)*0.62));
    afs=Math.max(afs,8);
    author=`<text x="150" y="428" text-anchor="middle" fill="${inkFor(bg)}" opacity=".8"
      font-family="Space Grotesk" font-weight="500" font-size="${afs.toFixed(1)}" letter-spacing="1.5">${esc(a)}</text>`;
  }
  const h=Math.round(w*1.5);
  return `<svg width="${w}" height="${h}" viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="450" fill="${bg}"/>
    <rect x="10" width="4" height="450" fill="rgba(0,0,0,.18)"/>
    ${shape}${textEls}${author}</svg>`;
}

/* Spine as DOM element */
function spineEl(book,withStars,ctx){
  const seed=hashSeed((book.author||'')+'|'+book.title);
  const R=rng(seed);
  const colorOrder=shuffled(SPINE_COLORS,R);
  const decoOrder=shuffled(DECOS,R);
  const fontOrder=shuffled(FONTS.map((_,i)=>i),R);
  const c=pickBalanced(colorOrder,ctx.colorUsage,x=>x===ctx.prevColor);
  const deco=pickBalanced(decoOrder,ctx.decoUsage,null);
  const fontIdx=pickBalanced(fontOrder,ctx.fontUsage,i=>i===ctx.prevFont);
  const font=FONTS[fontIdx];
  const ink=inkFor(c);
  const w=34+Math.floor(R()*20);
  const h=176+Math.floor(R()*58);
  const slot=document.createElement('div');
  slot.className='spine-slot';
  const el=document.createElement('div');
  el.className='spine';
  el.dataset.id=book.id;
  el.style.cssText=`width:${w}px;height:${h}px;background:${c};color:${ink}`;
  let decoTop='',decoBot='';
  if(deco===0)decoTop=`<div class="deco" style="height:10px;border-bottom:2px solid ${ink};border-top:5px solid ${ink};opacity:.85"></div>`;
  if(deco===1)decoTop=`<div class="deco" style="height:14px;display:grid;place-items:center"><span style="width:7px;height:7px;border-radius:99px;background:${ink};display:block;margin-top:8px"></span></div>`;
  if(deco===2)decoBot=`<div class="deco" style="height:12px;border-top:2px solid ${ink};opacity:.8;margin-bottom:5px"></div>`;
  if(deco===4){
    decoTop=`<div class="deco" style="height:11px;border-top:2px solid ${ink};border-bottom:1px solid ${ink};opacity:.85"></div>`;
    decoBot=`<div class="deco" style="height:11px;border-top:1px solid ${ink};border-bottom:2px solid ${ink};opacity:.85;margin-bottom:4px"></div>`;
  }
  if(deco===5)decoTop=`<div class="deco" style="height:17px;display:grid;place-items:center"><span style="width:8px;height:8px;background:${ink};transform:rotate(45deg);display:block;margin-top:9px"></span></div>`;
  if(deco===6)decoBot=`<div class="deco" style="margin-bottom:6px"><div style="height:2px;background:${ink};opacity:.85;margin:2.5px 0"></div><div style="height:2px;background:${ink};opacity:.85;margin:2.5px 0"></div><div style="height:2px;background:${ink};opacity:.85;margin:2.5px 0"></div></div>`;
  const t=font.up?String(book.title).toUpperCase():book.title;
  /* Adaptive text size so long titles/authors fit, ellipsis as backstop */
  const starH=withStars&&book.rating?book.rating*9+12:0;
  const avail=h-26-starH-26;
  let tfs=Math.min(12.5,avail/(Math.max(t.length,1)*0.62));
  tfs=Math.max(tfs,8);
  let authorHtml='';
  if(book.author){
    /* if the full name can't fit at a readable size, fall back to the last name */
    let aName=String(book.author).trim();
    if(aName.length*0.55*8>avail){
      const parts=aName.split(/\s+/);
      aName=parts[parts.length-1];
    }
    let afs=Math.min(9,avail/(Math.max(aName.length,1)*0.55));
    afs=Math.max(afs,7);
    authorHtml=`<span class="a" style="font-size:${afs.toFixed(1)}px">${esc(aName)}</span>`;
  }
  const stars=withStars&&book.rating?`<div class="stars">${'<span>★</span>'.repeat(book.rating)}</div>`:'';
  el.innerHTML=`${decoTop}
    <div class="txt">
      <span class="t" style="font-size:${tfs.toFixed(1)}px;font-family:${font.f};font-weight:${font.w};${font.it?'font-style:italic;':''}">${esc(t)}</span>
      ${authorHtml}
    </div>${stars}${decoBot}`;
  slot.appendChild(el);
  return {slot,el,color:c,fontIdx};
}

/* ---------- Shelf rendering ---------- */
function renderAll(){renderNow();renderDone();renderTbr();}

function renderNow(){
  const host=$('#shelf-now');host.innerHTML='';
  const list=books.filter(b=>b.status==='reading').sort((a,b)=>(a.order||0)-(b.order||0));
  if(!list.length){
    host.innerHTML=`<div class="empty"><b>Nothing open yet</b>
      Add an ePub with + or swipe right and pick a book from your TBR</div>`;
    return;
  }
  const rows=document.createElement('div');rows.className='cover-rows';rows.id='now-rows';
  const ctx={trioUsage:new Map(),varUsage:new Map(),fontUsage:new Map(),bannedBgs:new Set(),bannedVars:new Set(),bannedFont:null};
  const prevBgs=[];let prevVar=null,prevFont=null;
  for(const b of list){
    ctx.bannedBgs=new Set(prevBgs.slice(-2));
    ctx.bannedVars=new Set(prevVar!=null?[prevVar]:[]);
    ctx.bannedFont=prevFont;
    const st=coverStyle(b,ctx);
    prevBgs.push(st.trio[0]);prevVar=st.variant;prevFont=st.fontIdx;
    const w=128+Math.floor(st.widthJitter*34);
    const slot=document.createElement('div');slot.className='cover-slot';
    const cov=document.createElement('div');cov.className='cover';cov.dataset.id=b.id;
    cov.innerHTML=coverSVG(b,w,st);
    pressDrag(cov,{
      onTap:()=>{b.hasFile?openReader(b):sheetReadingNoFile(b);},
      onStillHold:()=>sheetReadingOptions(b),
      containerSel:'#now-rows',itemSel:'.cover',
      onReorder:persistOrder('#now-rows .cover'),
    });
    slot.appendChild(cov);rows.appendChild(slot);
  }
  host.appendChild(rows);
}

function renderDone(){
  const host=$('#shelf-done');host.innerHTML='';
  const list=books.filter(b=>b.status==='done').sort((a,b)=>(b.finishedAt||0)-(a.finishedAt||0));
  if(!list.length){
    host.innerHTML=`<div class="empty"><b>Your shelf is empty</b>
      Finish a book or add books you've already read with +</div>`;
    return;
  }
  const rows=document.createElement('div');rows.className='spine-rows';
  const ctx={colorUsage:new Map(),decoUsage:new Map(),fontUsage:new Map(),prevColor:null,prevFont:null};
  for(const b of list){
    const {slot,el,color,fontIdx}=spineEl(b,true,ctx);
    ctx.prevColor=color;ctx.prevFont=fontIdx;
    attachPress(el,()=>sheetDoneInfo(b),()=>sheetDoneActions(b));
    rows.appendChild(slot);
  }
  host.appendChild(rows);
}

function renderTbr(){
  const host=$('#shelf-tbr');host.innerHTML='';
  const list=books.filter(b=>b.status==='tbr').sort((a,b)=>(a.order||0)-(b.order||0));
  if(!list.length){
    host.innerHTML=`<div class="empty"><b>Your stack is empty</b>
      Add books you want to read next with +</div>`;
    return;
  }
  const rows=document.createElement('div');rows.className='spine-rows';rows.id='tbr-rows';
  const ctx={colorUsage:new Map(),decoUsage:new Map(),fontUsage:new Map(),prevColor:null,prevFont:null};
  for(const b of list){
    const {slot,el,color,fontIdx}=spineEl(b,false,ctx);
    ctx.prevColor=color;ctx.prevFont=fontIdx;
    pressDrag(el,{
      onTap:()=>sheetTbr(b),
      onStillHold:()=>sheetTbr(b),
      containerSel:'#tbr-rows',itemSel:'.spine',
      onReorder:persistOrder('#tbr-rows .spine'),
    });
    rows.appendChild(slot);
  }
  host.appendChild(rows);
}

function persistOrder(sel){
  return async()=>{
    const ids=[...document.querySelectorAll(sel)].map(x=>x.dataset.id);
    for(let i=0;i<ids.length;i++){
      const b=books.find(x=>x.id===ids[i]);
      if(b){b.order=i;await DB.put('books',b);}
    }
  };
}

/* ---------- Press / long-press (tap vs. hold, scroll-aware) ---------- */
function attachPress(el,onTap,onLong){
  let t=null,long=false,moved=false,sx=0,sy=0;
  el.addEventListener('pointerdown',e=>{
    long=false;moved=false;sx=e.clientX;sy=e.clientY;
    t=setTimeout(()=>{long=true;if(navigator.vibrate)navigator.vibrate(8);onLong();},420);
  });
  el.addEventListener('pointermove',e=>{
    if(Math.hypot(e.clientX-sx,e.clientY-sy)>10){moved=true;clearTimeout(t);}
  });
  el.addEventListener('pointerup',()=>{clearTimeout(t);if(!long&&!moved)onTap();});
  el.addEventListener('pointercancel',()=>clearTimeout(t));
}

/* ---------- Press / long-press / drag ----------
   The dragged element is NEVER moved in the DOM while the finger is down –
   Safari cancels the gesture when the captured node is reparented. Instead a
   ghost follows the finger, a drop indicator marks the target position, and
   the actual reorder happens once, on release. */
function pressDrag(el,opts){
  let timer=null,ghost=null,indicator=null;
  let drag=false,moved=false,preMoved=false,sx=0,sy=0;
  let dropRef,haveDrop=false,raf=0,lastEvt=null;
  el.addEventListener('touchmove',e=>{if(drag)e.preventDefault();},{passive:false});
  el.addEventListener('pointerdown',e=>{
    sx=e.clientX;sy=e.clientY;
    moved=false;preMoved=false;drag=false;haveDrop=false;dropRef=undefined;
    timer=setTimeout(()=>{
      drag=true;
      if(navigator.vibrate)navigator.vibrate(10);
      el.classList.add('dragging');
      ghost=document.createElement('div');
      ghost.className='drag-ghost';
      ghost.innerHTML=el.outerHTML;
      const r=el.getBoundingClientRect();
      ghost.style.width=r.width+'px';ghost.style.height=r.height+'px';
      ghost.style.left=(e.clientX-r.width/2)+'px';
      ghost.style.top=(e.clientY-r.height/2)+'px';
      document.body.appendChild(ghost);
      const cont=document.querySelector(opts.containerSel);
      if(cont){
        indicator=document.createElement('div');
        indicator.className='drop-ind';
        cont.appendChild(indicator);
      }
      try{el.setPointerCapture(e.pointerId);}catch(_){}
    },330);
  });
  function updateDrag(e){
    if(ghost){
      ghost.style.left=(e.clientX-ghost.offsetWidth/2)+'px';
      ghost.style.top=(e.clientY-ghost.offsetHeight/2)+'px';
    }
    const cont=document.querySelector(opts.containerSel);
    if(!cont||!indicator)return;
    const mySlot=el.parentElement;
    /* nearest slot by centre distance – works over gaps and shelf lines too */
    let best=null,bestD=Infinity;
    for(const s of cont.children){
      if(s===mySlot||s===indicator)continue;
      const r=s.getBoundingClientRect();
      const d=Math.hypot(e.clientX-(r.left+r.width/2),e.clientY-(r.top+r.height/2));
      if(d<bestD){bestD=d;best=s;}
    }
    if(!best){haveDrop=false;indicator.style.display='none';return;}
    const r=best.getBoundingClientRect();
    const after=e.clientY>r.bottom?true:(e.clientY<r.top?false:e.clientX>r.left+r.width/2);
    dropRef=after?best.nextSibling:best;
    /* the indicator itself may be the next sibling – dropping "before it" means: at the very end */
    if(dropRef===indicator)dropRef=null;
    haveDrop=true;
    if(dropRef===mySlot||mySlot.nextSibling===dropRef){
      indicator.style.display='none';
      return;
    }
    const cr=cont.getBoundingClientRect();
    indicator.style.display='block';
    indicator.style.height=Math.max(40,r.height-24)+'px';
    indicator.style.top=(r.top-cr.top+12)+'px';
    indicator.style.left=((after?r.right+1:r.left-5)-cr.left)+'px';
    /* auto-scroll the shelf near the edges */
    const shelf=cont.closest('.shelf');
    if(shelf){
      if(e.clientY<150)shelf.scrollBy(0,-9);
      else if(e.clientY>window.innerHeight-130)shelf.scrollBy(0,9);
    }
  }
  el.addEventListener('pointermove',e=>{
    if(!drag){
      if(Math.hypot(e.clientX-sx,e.clientY-sy)>10){preMoved=true;clearTimeout(timer);}
      return;
    }
    if(Math.hypot(e.clientX-sx,e.clientY-sy)>8)moved=true;
    lastEvt=e;
    if(!raf)raf=requestAnimationFrame(()=>{raf=0;if(drag&&lastEvt)updateDrag(lastEvt);});
  });
  const end=e=>{
    clearTimeout(timer);
    if(!drag){
      /* only a real tap opens the book – not a swipe that started on it */
      if(e.type==='pointerup'&&!preMoved)opts.onTap();
      return;
    }
    drag=false;
    el.classList.remove('dragging');
    if(ghost){ghost.remove();ghost=null;}
    if(indicator){indicator.remove();indicator=null;}
    const mySlot=el.parentElement;
    let didMove=false;
    if(moved&&haveDrop&&dropRef!==mySlot&&mySlot.nextSibling!==dropRef){
      mySlot.parentElement.insertBefore(mySlot,dropRef||null);
      didMove=true;
    }
    if(didMove)opts.onReorder();
    else if(!moved&&opts.onStillHold)opts.onStillHold();
  };
  el.addEventListener('pointerup',end);
  el.addEventListener('pointercancel',end);
}

/* ---------- Sheets ---------- */
function openSheet(html){
  $('#scrim').hidden=false;requestAnimationFrame(()=>$('#scrim').classList.add('on'));
  const sh=$('#sheet');sh.innerHTML='<div class="grip-zone"><div class="grip"></div></div>'+html;
  sh.scrollTop=0;
  requestAnimationFrame(()=>sh.classList.add('on'));
}
function closeSheet(){
  $('#sheet').classList.remove('on');
  $('#scrim').classList.remove('on');
  closeModal();
  window.scrollTo(0,0); /* re-anchor fixed elements after the iOS keyboard */
  setTimeout(()=>{$('#scrim').hidden=true;},280);
}
$('#scrim').addEventListener('click',closeSheet);

/* iOS sometimes leaves the visual viewport scrolled up after the keyboard
   closes, which makes fixed elements (like the + button) float too high.
   Re-anchor once no input is focused anymore. */
document.addEventListener('focusout',()=>{
  setTimeout(()=>{
    const a=document.activeElement;
    if(!a||!a.matches('input,textarea'))window.scrollTo(0,0);
  },60);
});

/* swipe the sheet down via the grip to dismiss it */
(function(){
  const sh=$('#sheet');let dragging=false,sy=0,dy=0;
  sh.addEventListener('pointerdown',e=>{
    if(!e.target.closest('.grip-zone'))return;
    dragging=true;sy=e.clientY;dy=0;
    sh.style.transition='none';
    try{sh.setPointerCapture(e.pointerId);}catch(_){}
  });
  sh.addEventListener('pointermove',e=>{
    if(!dragging)return;
    dy=Math.max(0,e.clientY-sy);
    sh.style.transform=`translateY(${dy}px)`;
  });
  const up=()=>{
    if(!dragging)return;
    dragging=false;
    sh.style.transition='';
    sh.style.transform='';
    if(dy>110)closeSheet();
  };
  sh.addEventListener('pointerup',up);
  sh.addEventListener('pointercancel',up);
})();

function starsHtml(n){return n?`<div class="stars-line">${'★'.repeat(n)}${'☆'.repeat(5-n)}</div>`:'';}
function confirmBtn(btn,fn){
  btn.addEventListener('click',()=>{
    if(btn.dataset.armed){fn();return;}
    btn.dataset.armed='1';btn.textContent='Tap again to delete';
    setTimeout(()=>{delete btn.dataset.armed;btn.textContent='Delete book';},2600);
  });
}
async function deleteBook(b){
  await DB.del('books',b.id);await DB.del('files',b.id).catch(()=>{});
  books=books.filter(x=>x.id!==b.id);
  renderAll();closeSheet();toast('Deleted');
}
function starsInput(hostSel,initial,onChange){
  let rating=initial||0;
  const host=$(hostSel);
  const paint=()=>host.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.v<=rating));
  paint();
  host.addEventListener('click',e=>{
    const v=e.target.dataset&&e.target.dataset.v;if(!v)return;
    rating=+v;paint();onChange(rating);
  });
}

  const quoteRows=(b.quotes||[]).map((q,i)=>`

      <textarea>${esc(q.text)}</textarea>
      <button class="qdel" aria-label="Remove quote">×</button>

    </div>

    <button class="btn primary" id="e-save">Save changes</button>
    <button class="btn danger" id="e-del">Delete book</button>

  });
  $('#e-save').addEventListener('click',async()=>{

    b.title=title;
    b.author=$('#e-author').value.trim();
    b.rating=rating;
    b.review=$('#e-review').value.trim();

/* ---------- Add a book ---------- */
function sheetAdd(){
  const mode=currentShelf; // 0 done, 1 reading, 2 tbr
  const titleTxt=['Log a finished book','Start a new book','Add to your TBR'][mode];
  let rating=0,fileBuf=null;
  openSheet(`
    <h2>${titleTxt}</h2>
    <div class="field"><label>Title</label><input type="text" id="f-title" autocomplete="off"></div>
    <div class="field"><label>Author</label><input type="text" id="f-author" autocomplete="off"></div>
    ${mode===0?`
      <div class="field"><label>Rating</label>
        <div class="stars-input" id="f-stars">${[1,2,3,4,5].map(i=>`<button data-v="${i}">★</button>`).join('')}</div>
      </div>
      <div class="field"><label>Thoughts (optional)</label><textarea id="f-review"></textarea></div>
    `:`
      <div class="field"><label>ePub ${mode===2?'(optional)':''}</label>
        <input type="file" id="f-file" accept=".epub,application/epub+zip" hidden>
        <button class="filebtn" id="f-filebtn">Choose ePub file</button>
      </div>
    `}
    <button class="btn primary" id="f-save">Save</button>
  `);
  if(mode===0){
    starsInput('#f-stars',0,v=>rating=v);
  }else{
    $('#f-filebtn').addEventListener('click',()=>$('#f-file').click());
    $('#f-file').addEventListener('change',async e=>{
      const f=e.target.files[0];if(!f)return;
      fileBuf=await f.arrayBuffer();
      $('#f-filebtn').textContent=f.name;
      $('#f-filebtn').classList.add('has');
      try{
        const bk=ePub(fileBuf.slice(0));
        const md=await bk.loaded.metadata;
        if(md.title&&!$('#f-title').value)$('#f-title').value=md.title;
        if(md.creator&&!$('#f-author').value)$('#f-author').value=md.creator;
        bk.destroy();
      }catch(_){}
    });
  }
  $('#f-save').addEventListener('click',async()=>{
    const title=$('#f-title').value.trim();
    if(!title){toast('Title missing');return;}
    const author=$('#f-author').value.trim();
    const b={
      id:uid(),title,author,quotes:[],addedAt:Date.now(),
      status:['done','reading','tbr'][mode],
      hasFile:!!fileBuf,
    };
    if(mode===0){
      b.rating=rating;b.review=($('#f-review').value||'').trim();b.finishedAt=Date.now();
    }
    if(mode===1){
      b.lastOpened=Date.now();
      b.order=Math.min(0,...books.filter(x=>x.status==='reading').map(x=>x.order||0))-1;
    }
    if(mode===2)b.order=Math.max(-1,...books.filter(x=>x.status==='tbr').map(x=>x.order||0))+1;
    if(fileBuf)await DB.put('files',fileBuf,b.id);
    await DB.put('books',b);
    books.push(b);renderAll();closeSheet();
  });
}

/* ---------- E-reader ---------- */
const Reader={
  book:null,rendition:null,item:null,open:false,
  fontPct:+(localStorage.getItem('lore-font')||100),
  theme:localStorage.getItem('lore-theme')||'dark',
  rfont:localStorage.getItem('lore-rfont')||'serif',
  pendingText:null,quoteMode:false,
};

const READER_THEMES={
  dark:{bg:'#16141A',fg:'#E9E2D4',link:'#B9A7E6'},
  light:{bg:'#F5EFE0',fg:'#2A2430',link:'#5B3A8E'},
};
const READER_FONTS={
  serif:"'Literata',Georgia,serif",
  sans:"'Space Grotesk',system-ui,sans-serif",
  dyslexic:"'OpenDyslexic','Space Grotesk',sans-serif",
};
const FONT_BASE=new URL('.',location.href).href;
const FONT_FACES=`
@font-face{font-family:'Literata';src:url('${FONT_BASE}fonts/Literata.ttf') format('truetype');font-weight:100 900;font-display:swap;}
@font-face{font-family:'Space Grotesk';src:url('${FONT_BASE}fonts/SpaceGrotesk.ttf') format('truetype');font-weight:300 700;font-display:swap;}
@font-face{font-family:'OpenDyslexic';src:url('${FONT_BASE}fonts/OpenDyslexic-Regular.woff') format('woff');font-weight:400;font-display:swap;}
@font-face{font-family:'OpenDyslexic';src:url('${FONT_BASE}fonts/OpenDyslexic-Bold.woff') format('woff');font-weight:700;font-display:swap;}
`;

function readerCSS(){
  const t=READER_THEMES[Reader.theme];
  const fam=READER_FONTS[Reader.rfont];
  return FONT_FACES+`
    html,body{background:${t.bg} !important;color:${t.fg} !important;}
    body,p,div,span,li,blockquote,h1,h2,h3,h4,h5,h6,td,th,dd,dt,figcaption{
      color:${t.fg} !important;
      background:transparent !important;
      font-family:${fam} !important;
      line-height:1.65 !important;
      letter-spacing:0 !important;
      text-shadow:none !important;
    }
    p{margin:0 0 .9em 0 !important;text-align:left !important;}
    a,a *{color:${t.link} !important;}
    img,svg{max-width:100% !important;height:auto !important;}
    ::selection{background:rgba(185,167,230,.4);}
    #lore-hl div{background:rgba(185,167,230,.45) !important;}
  `;
}
function applyReaderTheme(){
  $('#reader').classList.toggle('light',Reader.theme==='light');
  document.querySelectorAll('#r-theme button').forEach(x=>x.classList.toggle('on',x.dataset.t===Reader.theme));
  document.querySelectorAll('#r-font button').forEach(x=>x.classList.toggle('on',x.dataset.f===Reader.rfont));
  if(!Reader.rendition)return;
  Reader.rendition.getContents().forEach(c=>{
    let st=c.document.getElementById('lore-style');
    if(!st){st=c.document.createElement('style');st.id='lore-style';c.document.head.appendChild(st);}
    st.textContent=readerCSS();
  });
  Reader.rendition.themes.fontSize(Reader.fontPct+'%');
}

/* even integer pixel dimensions – fractional or percentage sizes trigger the
   infamous epub.js blank-page column bug on multi-page chapters */
function readerDims(){
  const v=$('#reader-view');
  let w=Math.floor(v.clientWidth);if(w%2)w-=1;
  let h=Math.floor(v.clientHeight);if(h%2)h-=1;
  return {w:Math.max(w,100),h:Math.max(h,100)};
}
window.addEventListener('resize',()=>{
  if(Reader.rendition){
    const d=readerDims();
    try{Reader.rendition.resize(d.w,d.h);}catch(_){}
  }
});

async function openReader(b){
  if(typeof ePub==='undefined'){
    toast('Reader engine missing — is the js folder uploaded?');
    return;
  }
  Reader.item=b;
  const buf=await DB.get('files',b.id);
  if(!buf){sheetReadingNoFile(b);return;}
  $('#reader').classList.add('on');Reader.open=true;
  $('#r-title').textContent=b.title;
  $('#rprog').style.width=(b.pct?Math.round(b.pct*100):0)+'%';
  $('#r-finish').hidden=true;
  applyReaderTheme();

  Reader.book=ePub(buf);
  const dims=readerDims();
  Reader.rendition=Reader.book.renderTo('reader-view',{
    width:dims.w,height:dims.h,flow:'paginated',spread:'none',allowScriptedContent:false,
  });

  /* inject own stylesheet with !important on every chapter load */
  Reader.rendition.hooks.content.register(contents=>{
    const st=contents.document.createElement('style');
    st.id='lore-style';st.textContent=readerCSS();
    contents.document.head.appendChild(st);
    setupQuote(contents);
    if(Reader.quoteMode)quoteBodyStyle(contents.document,true);
    /* middle third: toggle reading settings */
    contents.document.addEventListener('click',()=>{
      if(Reader.quoteMode)return;
      hideQuotePop();
      setRset(!$('#rset').classList.contains('on'));
    });
  });
  Reader.rendition.themes.fontSize(Reader.fontPct+'%');

  try{
    await Reader.rendition.display(b.cfi||undefined);
  }catch(_){
    try{
      b.cfi=null;
      await Reader.rendition.display();
    }catch(_2){
      toast('Could not open this ePub');
      closeReader();
      return;
    }
  }
  applyReaderTheme();

  /* location grid for the progress bar */
  Reader.book.ready.then(()=>Reader.book.locations.generate(650)).then(()=>{
    if(Reader.item&&Reader.rendition){
      const loc=Reader.rendition.currentLocation();
      if(loc&&loc.start)updateProgress(loc);
    }
  }).catch(()=>{});

  /* save progress on EVERY page turn (relocated) */
  Reader.rendition.on('relocated',async loc=>{
    if(!Reader.item)return;
    Reader.item.cfi=loc.start.cfi;
    updateProgress(loc);
    Reader.item.lastOpened=Date.now();
    await DB.put('books',Reader.item);
    await Stats.markRead();
    /* at the end: quietly offer the finish button, never kick the reader out */
    $('#r-finish').hidden=!loc.atEnd;
  });

  b.lastOpened=Date.now();
  await DB.put('books',b);
  Stats.startClock();
}

function updateProgress(loc){
  let pct=null;
  try{
    if(Reader.book.locations&&Reader.book.locations.length()>0)
      pct=Reader.book.locations.percentageFromCfi(loc.start.cfi);
  }catch(_){}
  if(pct==null&&loc.start.percentage!=null)pct=loc.start.percentage;
  if(pct!=null){
    Reader.item.pct=pct;
    $('#rprog').style.width=Math.round(pct*100)+'%';
  }
}

/* ---------- Quote mode ----------
   Native long-press selection is unusable inside the paginated iframe, so:
   tap the quote icon, then drag a finger across the text. We build the range
   from caret positions ourselves and paint our own highlight overlay. */
function caretFromPoint(doc,x,y){
  if(doc.caretRangeFromPoint){
    const r=doc.caretRangeFromPoint(x,y);
    return r?{node:r.startContainer,off:r.startOffset}:null;
  }
  if(doc.caretPositionFromPoint){
    const p=doc.caretPositionFromPoint(x,y);
    return p?{node:p.offsetNode,off:p.offset}:null;
  }
  return null;
}
/* quote mode needs full control over the touch stream: no native selection,
   no iOS callout menu, and touch-action none so pointermove never gets
   cancelled mid-drag */
function quoteBodyStyle(doc,on){
  const b=doc.body;if(!b)return;
  b.style.webkitUserSelect=on?'none':'';
  b.style.userSelect=on?'none':'';
  b.style.touchAction=on?'none':'';
  b.style.webkitTouchCallout=on?'none':'';
}
function setupQuote(contents){
  const doc=contents.document;
  const hlBox=doc.createElement('div');
  hlBox.id='lore-hl';
  hlBox.style.cssText='position:fixed;left:0;top:0;width:0;height:0;overflow:visible;pointer-events:none;z-index:9999';
  doc.body.appendChild(hlBox);
  let anchor=null,range=null;
  const paint=()=>{
    hlBox.innerHTML='';
    if(!range)return;
    for(const r of range.getClientRects()){
      const d=doc.createElement('div');
      d.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;background:rgba(185,167,230,.4);border-radius:3px`;
      hlBox.appendChild(d);
    }
  };
  doc.addEventListener('pointerdown',e=>{
    if(!Reader.quoteMode)return;
    anchor=caretFromPoint(doc,e.clientX,e.clientY);
    range=null;paint();hideQuotePop();
  });
  doc.addEventListener('pointermove',e=>{
    if(!Reader.quoteMode||!anchor)return;
    e.preventDefault();
    const cur=caretFromPoint(doc,e.clientX,e.clientY);
    if(!cur)return;
    const r=doc.createRange();
    try{
      r.setStart(anchor.node,anchor.off);
      r.setEnd(cur.node,cur.off);
      if(r.collapsed){
        r.setStart(cur.node,cur.off);
        r.setEnd(anchor.node,anchor.off);
      }
    }catch(_){return;}
    range=r;paint();
  });
  doc.addEventListener('touchmove',e=>{
    if(Reader.quoteMode&&anchor)e.preventDefault();
  },{passive:false});
  doc.addEventListener('pointerup',()=>{
    if(!Reader.quoteMode){anchor=null;return;}
    anchor=null;
    const text=range?range.toString().replace(/\s+/g,' ').trim():'';
    if(text){Reader.pendingText=text;$('#qpop').hidden=false;}
  });
  contents._loreClearHl=()=>{anchor=null;range=null;hlBox.innerHTML='';};
}
function clearQuoteHl(){
  if(!Reader.rendition)return;
  Reader.rendition.getContents().forEach(c=>{if(c._loreClearHl)c._loreClearHl();});
}
function setQuoteMode(on){
  Reader.quoteMode=on;
  $('#r-quote').classList.toggle('on',on);
  $('#reader').classList.toggle('quoting',on);
  if(Reader.rendition)Reader.rendition.getContents().forEach(c=>quoteBodyStyle(c.document,on));
  if(!on)clearQuoteHl();
  hideQuotePop();
}
$('#r-quote').addEventListener('click',()=>{
  setRset(false);
  setQuoteMode(!Reader.quoteMode);
  if(Reader.quoteMode)toast('Drag across the text to mark a quote');
});

$('#qpop').addEventListener('click',async()=>{
  const text=Reader.pendingText;
  if(!text||!Reader.item)return;
  Reader.item.quotes=Reader.item.quotes||[];
  Reader.item.quotes.push({text,date:Date.now()});
  await DB.put('books',Reader.item);
  Reader.pendingText=null;
  setQuoteMode(false);
  toast('Quote saved');
});

function closeReader(){
  Stats.stopClock();
  setQuoteMode(false);
  Reader.pendingText=null;
  setRset(false);
  $('#r-finish').hidden=true;
  hideQuotePop();
  $('#reader').classList.remove('on');
  Reader.open=false;
  const oldR=Reader.rendition,oldB=Reader.book;
  Reader.rendition=null;Reader.book=null;Reader.item=null;
  setTimeout(()=>{
    try{if(oldR)oldR.destroy();}catch(_){}
    try{if(oldB)oldB.destroy();}catch(_){}
  },320);
  renderNow();
}

/* ---------- Tracking & stats ---------- */
const Stats={
  _tick:null,_pending:0,
  async _day(key){
    let d=await DB.get('days',key);
    if(!d){d={date:key,sec:0,read:false};}
    return d;
  },
  startClock(){
    Stats.stopClock();
    Stats._tick=setInterval(async()=>{
      if(document.visibilityState!=='visible'||!Reader.open)return;
      Stats._pending++;
      if(Stats._pending>=5)await Stats.flush();
    },1000);
  },
  async flush(){
    if(!Stats._pending)return;
    const add=Stats._pending;Stats._pending=0;
    const key=todayKey();
    const d=await Stats._day(key);
    d.sec+=add;
    await DB.put('days',d);
  },
  async stopClock(){
    clearInterval(Stats._tick);Stats._tick=null;
    await Stats.flush();
  },
  async markRead(){
    const key=todayKey();
    const d=await Stats._day(key);
    if(!d.read){d.read=true;await DB.put('days',d);}
  },
  async streak(){
    const days=await DB.all('days');
    const map=new Map(days.map(d=>[d.date,d]));
    let n=0;const cur=new Date();
    const today=map.get(todayKey());
    if(!(today&&today.read))cur.setDate(cur.getDate()-1);
    while(true){
      const d=map.get(todayKey(cur));
      if(d&&d.read){n++;cur.setDate(cur.getDate()-1);}
      else break;
    }
    return n;
  },
};
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')Stats.flush();});
window.addEventListener('pagehide',()=>Stats.flush());

/* Reading stats */
let hmMonth=new Date();
async function renderDashboard(){
  await Stats.flush();
  const days=await DB.all('days');
  const map=new Map(days.map(d=>[d.date,d]));
  const y=hmMonth.getFullYear(),m=hmMonth.getMonth();
  const streak=await Stats.streak();

  const first=new Date(y,m,1);
  const startPad=(first.getDay()+6)%7; // Monday first
  const numDays=new Date(y,m+1,0).getDate();
  let cells='';
  for(let i=0;i<startPad;i++)cells+='<div></div>';
  for(let d=1;d<=numDays;d++){
    const key=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const rec=map.get(key);
    const min=rec?rec.sec/60:0;
    let lvl='';
    if(min>=60)lvl='l4';else if(min>=30)lvl='l3';else if(min>=10)lvl='l2';else if(min>0||(rec&&rec.read))lvl='l1';
    cells+=`<div class="d ${lvl}"></div>`;
  }
  const monthName=hmMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  openSheet(`
    <h2>Reading stats</h2>
    <div class="streak"><span class="n">${streak}</span><span class="l">day streak</span></div>
    <div class="hm-head">
      <button id="hm-prev" aria-label="Previous month">‹</button><b>${monthName}</b><button id="hm-next" aria-label="Next month">›</button>
    </div>
    <div class="heat">${cells}</div>
  `);
  $('#hm-prev').addEventListener('click',()=>{hmMonth.setMonth(hmMonth.getMonth()-1);renderDashboard();});
  $('#hm-next').addEventListener('click',()=>{hmMonth.setMonth(hmMonth.getMonth()+1);renderDashboard();});
}

/* Quote archive */
function sheetQuotes(){
  const all=[];
  for(const b of books)for(const q of(b.quotes||[]))all.push({text:q.text,date:q.date||0,title:b.title});
  all.sort((a,b)=>a.date-b.date);
  if(!all.length){
    openSheet(`<h2>Quote archive</h2>
      <p class="review-txt" style="margin-top:14px">No quotes yet. Tap the quote icon in the reader and drag across a passage.</p>`);
    return;
  }
  const usage=new Map();let prev=null;
  const cards=all.map(q=>{
    const order=shuffled(SPINE_COLORS,rng(hashSeed(q.text.slice(0,64))));
    const c=pickBalanced(order,usage,x=>x===prev);
    prev=c;
    const ink=inkFor(c);
    return `<div class="qcard" style="background:${c};color:${ink}">“${esc(q.text)}”<div class="qsrc">${esc(q.title)}</div></div>`;
  }).join('');
  openSheet(`<h2>Quote archive</h2><section>${cards}</section>`);
}

/* Import / Export */
function sheetData(){
  openSheet(`
    <h2>Import / Export</h2>
    <p class="review-txt" style="margin-top:12px">Before clearing your browser data or changing phones, export your data so you can import it later and pick up right where you left off.</p>
    <section>
      <button class="btn primary" id="ex-btn">Export data</button>
      <input type="file" id="im-file" accept=".zip,application/zip" hidden>
      <button class="btn primary" id="im-btn">Import data</button>
    </section>
  `);
  $('#ex-btn').addEventListener('click',async()=>{
    if(typeof JSZip==='undefined'){
      toast('JSZip missing — is the js folder uploaded?');
      return;
    }
    const btn=$('#ex-btn');btn.textContent='Exporting…';
    try{
      const zip=new JSZip();
      const days=await DB.all('days');
      zip.file('library.json',JSON.stringify({app:'lore',version:1,exported:Date.now(),books,days}));
      for(const b of books){
        if(!b.hasFile)continue;
        const buf=await DB.get('files',b.id);
        if(buf)zip.file('files/'+b.id+'.epub',buf);
      }
      const blob=await zip.generateAsync({type:'blob'});
      downloadBlob(blob,'lore-backup-'+todayKey()+'.zip');
      toast('Backup exported');
    }catch(_){toast('Export failed');}
    btn.textContent='Export data';
  });
  $('#im-btn').addEventListener('click',()=>$('#im-file').click());
  $('#im-file').addEventListener('change',async e=>{
    const f=e.target.files[0];if(!f)return;
    const btn=$('#im-btn');btn.textContent='Importing…';
    try{
      const z=await JSZip.loadAsync(f);
      const libF=z.file('library.json');
      if(!libF){toast('Not a Lore backup');btn.textContent='Import data';return;}
      const lib=JSON.parse(await libF.async('string'));
      for(const nb of(lib.books||[])){
        await DB.put('books',nb);
        const i=books.findIndex(x=>x.id===nb.id);
        if(i>=0)books[i]=nb;else books.push(nb);
      }
      for(const nd of(lib.days||[])){
        const ex=await DB.get('days',nd.date);
        const merged=ex?{date:nd.date,sec:Math.max(ex.sec||0,nd.sec||0),read:!!(ex.read||nd.read)}:nd;
        await DB.put('days',merged);
      }
      const epubs=z.file(/^files\/.+\.epub$/);
      for(const zf of epubs){
        const id=zf.name.slice(6,-5);
        const buf=await zf.async('arraybuffer');
        await DB.put('files',buf,id);
      }
      renderAll();closeSheet();toast('Import complete');
    }catch(_){toast('Import failed');btn.textContent='Import data';}
  });
}

function goShelf(i){

$('#pager').addEventListener('scroll',()=>{
  const i=Math.round($('#pager').scrollLeft/window.innerWidth);
  if(i!==currentShelf){
    currentShelf=i;
    $('#shelf-name').textContent=SHELF_NAMES[i];
    document.querySelectorAll('.dots i').forEach((d,j)=>d.classList.toggle('on',j===i));
  }
},{passive:true});

/* ---------- Boot ---------- */
(async function init(){
  await DB.open();
  books=await DB.all('books');
  /* migrate: give reading/tbr books a manual order if missing */
  for(const st of ['reading','tbr']){
    const l=books.filter(b=>b.status===st);
    if(l.length&&l.some(b=>b.order==null)){
      l.sort((a,b)=>st==='reading'?(b.lastOpened||0)-(a.lastOpened||0):(a.order||0)-(b.order||0));
      for(let i=0;i<l.length;i++){l[i].order=i;await DB.put('books',l[i]);}
    }
  }
  renderAll();
  requestAnimationFrame(()=>{$('#pager').scrollTo({left:window.innerWidth,behavior:'instant'});});
  if('serviceWorker' in navigator&&location.protocol.startsWith('http')){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
})();
window.addEventListener('resize',()=>{$('#pager').scrollTo({left:currentShelf*window.innerWidth,behavior:'instant'});});
